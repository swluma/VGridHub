<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <title>Games</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1>Games</h1>
      <p class="page-description">Choose a game and start in local play or through a room.</p>
    </header>

    <section class="controls">
      <div class="field">
        <label for="playerName">Player Name</label>
        <input id="playerName" type="text" maxlength="24" placeholder="Enter your name" />
      </div>

      <div class="field">
        <label for="playMode">Play Mode</label>
        <select id="playMode">
          <option value="local">Local Play</option>
          <option value="host">Create Room</option>
          <option value="join">Join Room</option>
        </select>
      </div>

      <div class="field room-field">
        <label for="roomCode">Room Code</label>
        <div class="room-input-row">
          <input id="roomCode" type="text" maxlength="12" placeholder="Example: ABCD12" />
          <button id="generateRoomCodeBtn" type="button">Generate</button>
        </div>
      </div>
    </section>

    <section id="gamesList" class="games-list">
      <div class="message">Loading games.</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
